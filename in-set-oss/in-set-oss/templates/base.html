<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IN-SET-OSS — {% block title %}{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f4f7fb; }
    .sidebar { min-height: 100vh; background: #1a3a5c; }
    .sidebar a { color: #a8c8e8; text-decoration: none; display: block; padding: 10px 20px; }
    .sidebar a:hover, .sidebar a.active { background: #1e5fa8; color: #fff; border-radius: 6px; }
    .sidebar .brand { color: #fff; font-size: 1.3rem; font-weight: bold; padding: 20px; border-bottom: 1px solid #1e5fa8; }
    .sidebar .mission { color: #7aabcc; font-size: 0.75rem; padding: 0 20px 16px; }
    .main-content { padding: 30px; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
    .btn-primary { background: #1e5fa8; border-color: #1e5fa8; }
    .btn-primary:hover { background: #1a3a5c; border-color: #1a3a5c; }
    .table thead { background: #1a3a5c; color: #fff; }
  </style>
</head>
<body>
<div class="d-flex">
  <div class="sidebar col-2 p-0">
    <div class="brand">⚔️ IN-SET-OSS</div>
    <div class="mission">Luta Mais — Para a Glória de Deus</div>
    <a href="/dashboard/"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
    <a href="/clientes/"><i class="bi bi-people me-2"></i>Clientes</a>
    <a href="/produtos/"><i class="bi bi-box me-2"></i>Produtos</a>
    <a href="/vendas/"><i class="bi bi-cart me-2"></i>Vendas</a>
    <a href="/relatorios/"><i class="bi bi-bar-chart me-2"></i>Relatórios</a>
    <hr style="border-color:#1e5fa8">
    <a href="/logout/"><i class="bi bi-box-arrow-right me-2"></i>Sair</a>
  </div>
  <div class="col-10 main-content">
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
          {{ message }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  window.AUTH_TOKEN = '{{ token }}';
</script>
{% block scripts %}{% endblock %}
</body>
</html>
