<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>IN-SET-OSS — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #1a3a5c; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    .brand { color: #1a3a5c; font-size: 2rem; font-weight: bold; }
    .mission { color: #888; font-size: 0.85rem; }
    .btn-primary { background: #1a3a5c; border: none; }
    .btn-primary:hover { background: #1e5fa8; }
  </style>
</head>
<body>
  <div class="card p-5" style="width:400px">
    <div class="text-center mb-4">
      <div class="brand">⚔️ IN-SET-OSS</div>
      <div class="mission">Luta Mais — Para a Glória de Deus</div>
    </div>
    {% if erro %}
      <div class="alert alert-danger">{{ erro }}</div>
    {% endif %}
    <form method="POST">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Usuário</label>
        <input type="text" name="username" class="form-control" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label">Senha</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Entrar</button>
    </form>
  </div>
</body>
</html>
