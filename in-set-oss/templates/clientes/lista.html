{% extends 'base.html' %}
{% block title %}Clientes{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2>Clientes</h2>
  <a href="/clientes/novo/" class="btn btn-primary"><i class="bi bi-plus"></i> Novo Cliente</a>
</div>
<div class="card">
  <div class="card-body p-0">
    <table class="table table-hover mb-0">
      <thead><tr><th>Nome</th><th>CPF</th><th>Email</th><th>Telefone</th><th></th></tr></thead>
      <tbody id="tabela-clientes"></tbody>
    </table>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
fetch('/api/clientes/', { credentials: 'same-origin' })
  .then(r => r.json()).then(clientes => {
    const tbody = document.getElementById('tabela-clientes');
    clientes.forEach(c => {
      tbody.innerHTML += `<tr>
        <td>${c.nome}</td><td>${c.cpf}</td><td>${c.email}</td><td>${c.telefone || '—'}</td>
        <td>
          <a href="/clientes/${c.id}/editar/" class="btn btn-sm btn-outline-primary">Editar</a>
          <button onclick="excluir(${c.id})" class="btn btn-sm btn-outline-danger">Excluir</button>
        </td>
      </tr>`;
    });
  });

function excluir(id) {
  if (!confirm('Excluir este cliente?')) return;
  fetch('/api/clientes/' + id + '/', {
    method: 'DELETE',
    credentials: 'same-origin',
    headers: { 'X-CSRFToken': document.cookie.match(/csrftoken=([^;]+)/)[1] }
  }).then(() => location.reload());
}
</script>
{% endblock %}
