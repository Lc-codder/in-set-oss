{% extends 'base.html' %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<h2 class="mb-4">Dashboard</h2>
<div class="row g-4 mb-4">
  <div class="col-md-3">
    <div class="card p-4 text-center">
      <div style="font-size:2rem">👥</div>
      <h3 id="total-clientes">—</h3>
      <div class="text-muted">Clientes</div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card p-4 text-center">
      <div style="font-size:2rem">📦</div>
      <h3 id="total-produtos">—</h3>
      <div class="text-muted">Produtos</div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card p-4 text-center">
      <div style="font-size:2rem">🛒</div>
      <h3 id="total-vendas">—</h3>
      <div class="text-muted">Vendas</div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card p-4 text-center">
      <div style="font-size:2rem">💰</div>
      <h3 id="total-valor">—</h3>
      <div class="text-muted">Receita Total</div>
    </div>
  </div>
</div>
<div class="card p-4">
  <h5 class="mb-3">Vendas por Mês</h5>
  <canvas id="grafico-vendas" height="80"></canvas>
</div>
{% endblock %}
{% block scripts %}
<script>
fetch('/api/clientes/', { credentials: 'same-origin' }).then(r => r.json()).then(d => {
  document.getElementById('total-clientes').textContent = d.length || d.count || '—';
});
fetch('/api/produtos/', { credentials: 'same-origin' }).then(r => r.json()).then(d => {
  document.getElementById('total-produtos').textContent = d.length || d.count || '—';
});
fetch('/api/vendas/', { credentials: 'same-origin' }).then(r => r.json()).then(d => {
  document.getElementById('total-vendas').textContent = d.length || d.count || 0;
});
fetch('/api/relatorios/anual/', { credentials: 'same-origin' }).then(r => r.json()).then(dados => {
  const labels = dados.map(d => d.mes);
  const valores = dados.map(d => parseFloat(d.total));
  const total = valores.reduce((a, b) => a + b, 0);
  document.getElementById('total-valor').textContent = 'R$ ' + total.toFixed(2);
  new Chart(document.getElementById('grafico-vendas'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{ label: 'Receita (R$)', data: valores, backgroundColor: '#1e5fa8' }]
    },
    options: { responsive: true, plugins: { legend: { display: false } } }
  });
});
</script>
{% endblock %}
