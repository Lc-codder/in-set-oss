{% extends 'base.html' %}
{% block title %}{{ titulo }}{% endblock %}
{% block content %}
<h2 class="mb-4">{{ titulo }}</h2>
<div class="card p-4" style="max-width:600px">
  <form id="form-produto">
    {% csrf_token %}
    <div class="mb-3"><label class="form-label">Nome</label><input type="text" id="nome" class="form-control" required></div>
    <div class="mb-3"><label class="form-label">Descrição</label><textarea id="descricao" class="form-control"></textarea></div>
    <div class="mb-3"><label class="form-label">Preço (R$)</label><input type="number" id="preco" class="form-control" step="0.01" min="0" required></div>
    <div class="mb-3"><label class="form-label">Estoque</label><input type="number" id="quantidade_estoque" class="form-control" min="0" required></div>
    <div class="mb-3"><label class="form-label">Estoque Mínimo</label><input type="number" id="estoque_minimo" class="form-control" min="0"></div>
    <div id="erro" class="alert alert-danger d-none"></div>
    <button type="submit" class="btn btn-primary">Salvar</button>
    <a href="/produtos/" class="btn btn-secondary ms-2">Cancelar</a>
  </form>
</div>
{% endblock %}
{% block scripts %}
<script>
const produtoId = "{{ produto_id }}";

if (produtoId) {
  fetch('/api/produtos/' + produtoId + '/', { credentials: 'same-origin' })
    .then(r => r.json()).then(p => {
      document.getElementById('nome').value = p.nome;
      document.getElementById('descricao').value = p.descricao || '';
      document.getElementById('preco').value = p.preco;
      document.getElementById('quantidade_estoque').value = p.quantidade_estoque;
      document.getElementById('estoque_minimo').value = p.estoque_minimo;
    });
}

document.getElementById('form-produto').addEventListener('submit', async (e) => {
  e.preventDefault();
  const data = {
    nome: document.getElementById('nome').value,
    descricao: document.getElementById('descricao').value,
    preco: document.getElementById('preco').value,
    quantidade_estoque: document.getElementById('quantidade_estoque').value,
    estoque_minimo: document.getElementById('estoque_minimo').value,
  };
  const url = produtoId ? '/api/produtos/' + produtoId + '/' : '/api/produtos/';
  const method = produtoId ? 'PUT' : 'POST';
  const res = await fetch(url, {
    method,
    credentials: 'same-origin',
    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': document.cookie.match(/csrftoken=([^;]+)/)[1] },
    body: JSON.stringify(data)
  });
  if (res.ok) { window.location.href = '/produtos/'; }
  else {
    const err = await res.json();
    const erroEl = document.getElementById('erro');
    erroEl.textContent = err.mensagem || JSON.stringify(err);
    erroEl.classList.remove('d-none');
  }
});
</script>
{% endblock %}
